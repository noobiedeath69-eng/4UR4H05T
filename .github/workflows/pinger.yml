name: SIGMA-7-FINAL-SENTINEL

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Launch
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # 1. Install dependencies (Clean environment, no NODE_OPTIONS yet)
          npm install
          
          # 2. Jailbreak the internal package.json
          ROGUE_JSON="SIGMA-7-Programzip/Deployment-Sentinel/artifacts/discord-bot/package.json"
          if [ -f "$ROGUE_JSON" ]; then 
            mv "$ROGUE_JSON" "${ROGUE_JSON}.disabled"
            echo "💥 Rogue firewall disabled."
          fi
          
          echo "🛡️ SENTINEL ONLINE. Loading ESM environment..."
          
          # 3. Launch with NODE_OPTIONS defined ONLY for this process
          until NODE_OPTIONS="--import tsx/esm" npx tsx server/index.ts; do
            echo "⚠️ Crashed. Respawning..."
            sleep 5
          done
