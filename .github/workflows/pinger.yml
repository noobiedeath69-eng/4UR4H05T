name: GitHub Bot Host 2026 Clean

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

# We remove the FORCE flag because GitHub is now doing it by default,
# which was causing the "contradiction" warning.
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        # Checkout v4 is Node 24 ready, even if it "targets" 20.

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Discord Bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: python main.py
