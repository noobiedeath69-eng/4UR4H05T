name: SIGMA-7-Full-Sentinel

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  immortal-host:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Clone Repository
        uses: actions/checkout@v4

      - name: 2. Setup Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install, Patch & Launch
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: |
          # A. Install root dependencies
          npm install
          
          # B. Navigate to the deep bot folder
          echo "🛠️ Entering SIGMA-7 Deep Core..."
          cd SIGMA-7-Programzip/Deployment-Sentinel/artifacts/discord-bot
          
          # C. THE HYDRA-SLAYER FIX: 
          # This replaces "workspace:*", "catalog:", or ANY "protocol:" with "latest"
          echo "💉 Surgical strike on package.json protocols..."
          sed -i 's/workspace:\*/latest/g' package.json
          sed -i 's/catalog:/latest/g' package.json
          
          # D. Install deep dependencies now that the protocols are dead
          echo "📦 Installing deep dependencies..."
          npm install --no-package-lock --if-present
          
          # E. Return to the root
          cd ../../../../../
          
          # F. Register the Slash Commands
          echo "🚀 Registering Slash Commands..."
          npx tsx SIGMA-7-Programzip/Deployment-Sentinel/artifacts/discord-bot/src/commands/deploy.ts
          
          # G. Start the Sentinel Loop
          echo "🛡️ SENTINEL ACTIVE: Monitoring AssetAurora..."
          until npx tsx server/index.ts; do
            echo "⚠️ Bot crashed. Respawning in 5 seconds..." >&2
            sleep 5
          done
          sed -i 's/workspace:\*/latest/g' package.json
          
          # D. Install deep dependencies now that the protocol is fixed
          echo "📦 Installing deep dependencies..."
          npm install --no-package-lock --if-present
          
          # E. Return to the root
          cd ../../../../../
          
          # F. Register the Slash Commands
          echo "🚀 Registering Slash Commands..."
          npx tsx SIGMA-7-Programzip/Deployment-Sentinel/artifacts/discord-bot/src/commands/deploy.ts
          
          # G. Start the Sentinel Loop
          echo "🛡️ SENTINEL ACTIVE: Monitoring AssetAurora..."
          until npx tsx server/index.ts; do
            echo "⚠️ Bot crashed. Respawning in 5 seconds..." >&2
            sleep 5
          done
          
          # 4. Register Commands
          echo "🚀 Registering Slash Commands..."
          npx tsx SIGMA-7-Programzip/Deployment-Sentinel/artifacts/discord-bot/src/commands/deploy.ts
          
          # 5. Start the Sentinel
          echo "🛡️ SENTINEL ACTIVE..."
          until npx tsx server/index.ts; do
            echo "Bot crashed. Respawning..." >&2
            sleep 5
          done
