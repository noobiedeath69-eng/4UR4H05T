name: GitHub Bot Host 2026 Edition

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

# This forces the runner to use the new Node.js 24 engine immediately
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Note: V4 is compatible with Node 24 runners

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Upgraded Python for 2026 stability

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Manual fallback if you don't have a requirements file:
          # pip install discord.py

      - name: Run Discord Bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: python main.py
