    runs-on: ubuntu-latest
    steps:
      - name: The Triple Knock
        run: |
          # 1. First Ping
          curl -sL "https://e4399b89-a932-4013-b405-02722b2172b8-00-14l11mw8xr4hu.pike.replit.dev"
          echo "First knock sent."
          
          sleep 120 # Wait 2 minutes
          
          # 2. Second Ping
          curl -sL "https://e4399b89-a932-4013-b405-02722b2172b8-00-14l11mw8xr4hu.pike.replit.dev"
          echo "Second knock sent."
          
          sleep 120 # Wait another 2 minutes
          
          # 3. Third Ping
          curl -sL "https://e4399b89-a932-4013-b405-02722b2172b8-00-14l11mw8xr4hu.pike.replit.dev"
          echo "Third knock sent. Replit should stay awake until next cron."
