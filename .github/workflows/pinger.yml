name: SIGMA-7-GOD-SENTINEL

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Launch Immortal Sentinel
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: |
          # 1. Install root only
          npm install
          
          # 2. Set the path variable
          DB_PATH="./SIGMA-7-Programzip/Deployment-Sentinel/artifacts/discord-bot/src/lib/db.ts"
          
          echo "🛡️ Sentinel Active. Forcing Workspace Aliases..."
          
          # 3. We use the --alias flag to point @workspace/db to the ACTUAL file 
          # so the import inside the bot folder stops crashing.
          until npx tsx --alias "@workspace/db=$DB_PATH" server/index.ts; do
            echo "Crashed. Respawning..." >&2
            sleep 5
          done
          echo "🛡️ SENTINEL ACTIVE..."
          until npx tsx server/index.ts; do
            echo "⚠️ Bot crashed. Respawning..." >&2
            sleep 5
          done
