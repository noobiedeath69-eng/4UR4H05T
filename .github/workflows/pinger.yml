name: Operation Aurora Turbo-Pinger

on:
  schedule:
    - cron: '*/5 * * * *' # Triggers every 5 mins
  workflow_dispatch:      # Manual trigger

jobs:
  turbo_ping:
    runs-on: ubuntu-latest
    steps:
      - name: Multi-Stage Wakeup
        run: |
          echo "Starting 2-minute heavy wake cycle..."
          # Ping once immediately
          curl -s -L "https://e4399b89-a932-4013-b405-02722b2172b8-00-14l11mw8xr4hu.pike.replit.dev"
          
          sleep 60 # Wait 1 minute
          
          # Ping again halfway through the window
          curl -s -L "https://e4399b89-a932-4013-b405-02722b2172b8-00-14l11mw8xr4hu.pike.replit.dev"
          
          echo "Bot should be wide awake."
