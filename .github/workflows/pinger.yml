name: SIGMA-7-Sentinel-Final

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Launch Immortal Sentinel
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: |
          npm install
          echo "🛡️ Sentinel Active. Launching Server..."
          # We run the server, and the server will wake up the bot.
          until npx tsx server/index.ts; do
            echo "Crashed. Respawning..." >&2
            sleep 5
          done
          ln -s $(pwd)/SIGMA-7-Programzip/Deployment-Sentinel/artifacts/discord-bot/src/lib node_modules/@workspace/db
          
          # C. Register the Slash Commands
          echo "🚀 Registering Slash Commands..."
          npx tsx SIGMA-7-Programzip/Deployment-Sentinel/artifacts/discord-bot/src/commands/deploy.ts
          
          # D. Start the Sentinel
          echo "🛡️ SENTINEL ACTIVE..."
          until npx tsx server/index.ts; do
            echo "⚠️ Bot crashed. Respawning..." >&2
            sleep 5
          done
