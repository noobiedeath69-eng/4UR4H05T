name: SIGMA-7-FINAL-STAND-V2

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Launch
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npm install
          echo "🛡️ Sentinel Online. No more aliases. Direct paths only."
          until npx tsx server/index.ts; do
            echo "Crashed. Respawning..." >&2
            sleep 5
          done
