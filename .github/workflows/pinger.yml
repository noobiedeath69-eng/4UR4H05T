name: SIGMA-7-Full-Sentinel

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  immortal-host:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Clone Repository
        uses: actions/checkout@v4

      - name: 2. Setup Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install & Launch
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: |
          # 1. Install root dependencies
          npm install
          
          # 2. Go deep and install using the Link flag
          echo "📦 Forcing installation of SIGMA-7 dependencies..."
          cd SIGMA-7-Programzip/Deployment-Sentinel/artifacts/discord-bot
          npm install --install-links --if-present
          
          # 3. Return to root
          cd ../../../../../
          
          # 4. Register Commands
          echo "🚀 Registering Slash Commands..."
          npx tsx SIGMA-7-Programzip/Deployment-Sentinel/artifacts/discord-bot/src/commands/deploy.ts
          
          # 5. Start the Sentinel
          echo "🛡️ SENTINEL ACTIVE..."
          until npx tsx server/index.ts; do
            echo "Bot crashed. Respawning..." >&2
            sleep 5
          done
