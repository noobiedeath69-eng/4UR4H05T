name: Replit Pinger Indefinite

on:
  schedule:
    # This triggers every 5 minutes (the most frequent GitHub allows)
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # This button lets you test it manually in the Actions tab

jobs:
  pinger_job:
    runs-on: ubuntu-latest
    steps:
      - name: Send Keep-Alive Signal to Operation Aurora
        run: |
          curl -I -s -L "https://e4399b89-a932-4013-b405-02722b2172b8-00-14l11mw8xr4hu.pike.replit.dev"
          echo "Ping sent at $(date)"
