name: SIGMA-7-FINAL-SENTINEL

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Launch Pro Sentinel
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # THE KEY: This forces Node to use the ESM loader for all TSX operations
          NODE_OPTIONS: "--import tsx/esm"
        run: |
          npm install
          
          # Jailbreak: Move internal package.json so it stops blocking the root
          ROGUE_JSON="SIGMA-7-Programzip/Deployment-Sentinel/artifacts/discord-bot/package.json"
          if [ -f "$ROGUE_JSON" ]; then 
            mv "$ROGUE_JSON" "${ROGUE_JSON}.disabled"
            echo "💥 Rogue firewall disabled."
          fi
          
          echo "🛡️ SENTINEL ONLINE. Executing with ESM Loader..."
          
          # We use the direct tsx execution without the broken --format flag
          until npx tsx server/index.ts; do
            echo "⚠️ Crashed. Respawning..."
            sleep 5
          done
