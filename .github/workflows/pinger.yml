name: SIGMA-7-ULTIMATE-SENTINEL

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Clone
        uses: actions/checkout@v4

      - name: 2. Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Launch Immortal Sentinel
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          # These other secrets might be needed for your DB connection
          DATABASE_URL: ${{ secrets.DATABASE_URL }} 
        run: |
          npm install
          echo "🛡️ Sentinel Active. Launching Server..."
          until npx tsx server/index.ts; do
            echo "Crashed. Respawning in 5s..." >&2
            sleep 5
          done
