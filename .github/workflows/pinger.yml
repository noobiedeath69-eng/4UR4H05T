name: GitHub Bot Host (AssetAurora Edition)

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

env:
  # May 2026 Compatibility Flags
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_ENV: development

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Matches your @types/node version

      - name: Install Dependencies
        run: |
          npm install
          # We manually ensure tsx is available globally just in case
          npm install -g tsx

      - name: Start AssetAurora Engine
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          # If your code uses a DATABASE_URL or other vars, add them here!
        run: npx tsx server/index.ts

      - name: Run Discord Bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: python main.py
