name: SIGMA-7-Final-Sentinel

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  immortal-host:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Clone Repository
        uses: actions/checkout@v4

      - name: 2. Setup Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. The Ghost-Bridge Launch
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: |
          # A. Install root dependencies
          npm install
          
          # B. THE BRIDGE: Find where your DB code is and link it manually
          # We are creating a 'fake' package so @workspace/db actually points somewhere
          echo "🌉 Building the Ghost-Bridge..."
          mkdir -p node_modules/@workspace
          
          # We link the 'db' folder to the actual location in your artifacts
          # NOTE: Adjust the path after 'ln -s' if your db folder is named differently!
          ln -s $(pwd)/SIGMA-7-Programzip/Deployment-Sentinel/artifacts/discord-bot/src/lib node_modules/@workspace/db
          
          # C. Register the Slash Commands
          echo "🚀 Registering Slash Commands..."
          npx tsx SIGMA-7-Programzip/Deployment-Sentinel/artifacts/discord-bot/src/commands/deploy.ts
          
          # D. Start the Sentinel
          echo "🛡️ SENTINEL ACTIVE..."
          until npx tsx server/index.ts; do
            echo "⚠️ Bot crashed. Respawning..." >&2
            sleep 5
          done
